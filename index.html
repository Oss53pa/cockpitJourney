<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/cj-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#F4F2E9" />
    <meta name="description" content="CockpitJourney — Pilotez votre journée. Le compagnon quotidien de gestion de tâches et de projets, propulsé par PROPH3T." />
    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- iOS PWA support — Safari ignores SVG icons + needs PNG at 180×180.
         The 192×192 PNG is close enough; iOS scales it down cleanly. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Cockpit" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/cj-icon-192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/cj-icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/cj-icon-512.png" />
    <!-- Tell Android Chrome we have a maskable icon so the system can
         crop it cleanly into the launcher's adaptive shape. -->
    <meta name="msapplication-TileColor" content="#6E8B58" />
    <meta name="msapplication-TileImage" content="/cj-icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Grand+Hotel&family=Dosis:wght@200;300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <title>CockpitJourney — Pilotez votre journée.</title>
  </head>
  <body class="bg-atlas-black text-atlas-fg-1 antialiased" style="background-color: #F4F2E9;">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
